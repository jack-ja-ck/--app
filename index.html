<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>敬拜投屏 · 专业版</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js" defer></script>
    <script src="app.js" defer></script>
</head>
<body data-theme="dark">
<div id="app">
    <!-- 左侧诗歌库 -->
    <div id="song-library">
        <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:10px;">
            <h3 style="margin:0;">📚 诗歌库</h3>
            <button id="new-song-btn" class="icon-btn" title="新建诗歌">+</button>
        </div>
        <div style="position:relative; margin-bottom:10px;">
            <span style="position:absolute; left:12px; top:50%; transform:translateY(-50%); color:var(--text-secondary); font-size:0.9rem; z-index:1;">🔍</span>
            <input type="text" id="search-input" placeholder="搜索我的诗歌..." style="width:100%; padding:8px 12px 8px 32px; border-radius:12px; border:1px solid var(--border-color); background:rgba(255,255,255,0.08); backdrop-filter:blur(5px); color:var(--text-primary);">
        </div>
        <div style="position:relative; margin-bottom:10px;">
            <span style="position:absolute; left:12px; top:50%; transform:translateY(-50%); color:var(--text-secondary); font-size:0.9rem; z-index:1;">🌐</span>
            <input type="text" id="online-search-input" placeholder="在线搜索诗歌..." style="width:100%; padding:8px 12px 8px 32px; border-radius:12px; border:1px solid var(--border-color); background:rgba(255,255,255,0.08); backdrop-filter:blur(5px); color:var(--text-primary);">
        </div>
        <div id="online-results" style="max-height:150px; overflow-y:auto; margin-bottom:10px;"></div>
        <div id="tag-filter" style="display:flex; flex-wrap:wrap; gap:6px; margin-bottom:10px;"></div>
        <ul id="song-list"></ul>
        <button id="add-song-btn" class="add-song-btn">➕ 新建诗歌</button>
        <div class="file-import-export">
            <button id="export-data-btn" class="small-btn">📤 导出</button>
            <button id="import-data-btn" class="small-btn">📥 导入</button>
            <input type="file" id="import-file-input" accept=".worship,application/json" hidden>
        </div>
        <button id="batch-import-btn" class="small-btn" style="margin-top:8px;">📋 批量导入歌词</button>
    </div>

    <div class="resize-handle" id="resize1"></div>

    <!-- 中间编辑区 -->
    <div id="editor-area">
        <div id="current-song-title">
            <input type="text" id="song-title-input" placeholder="诗歌标题" value="奇异恩典">
            <button id="save-song-btn" class="btn">保存歌词</button>
            <button id="publish-song-btn" class="btn btn-outline">☁️ 发布到云端</button>
        </div>
        <textarea id="lyric-editor-large" placeholder="输入歌词，一行一句。用空行或 [page] 分隔页面。第一页若为单行将作为歌名。"></textarea>
        <details id="song-meta-details" style="margin-bottom:10px;">
            <summary style="cursor:pointer;padding:8px 12px;background:rgba(255,255,255,0.05);border-radius:10px;color:var(--text-secondary);font-size:0.9rem;list-style:none;user-select:none;">🎵 更多歌曲信息</summary>
            <div id="song-meta" style="padding:12px;display:flex;gap:15px;align-items:center;flex-wrap:wrap;">
                <span class="meta-field"><label>🎵 调性</label><input type="text" id="song-key" placeholder="C"></span>
                <span class="meta-field"><label>⏱️ 速度</label><input type="text" id="song-tempo" placeholder="72"></span>
                <span class="meta-field" style="flex:1; min-width:180px; max-width:300px;"><label>📝 备注</label><input type="text" id="song-notes" placeholder="如：副歌反复" style="width:100%;"></span>
                <span class="meta-field"><label>🏷️ 标签</label><input type="text" id="song-tags" placeholder="敬拜,感恩" style="width:120px;"></span>
            </div>
        </details>
        <div class="editor-toolbar">
            <button id="apply-to-display" class="btn">应用到演示屏</button>
            <button id="reset-current-song" class="btn btn-outline">重置示例</button>
            <button id="ocr-btn" class="btn btn-outline">📷 拍照识歌词</button>
            <input type="file" id="ocr-file-input" accept="image/*" capture="environment" hidden>
        </div>
        <!-- 投屏预览 -->
        <div id="speaker-view">
            <div id="speaker-resize-handle"></div>
            <div class="speaker-view-label">投屏预览 - 可左右滑动预览各页</div>
            <h4>
                <span>🖥️ 投屏预览：横滑预览各页</span>
                <span>
                    <span class="size-btn-group">
                        <button id="size-s" class="size-btn">S</button>
                        <button id="size-m" class="size-btn active">M</button>
                        <button id="size-l" class="size-btn">L</button>
                    </span>
                    <span id="page-indicator">1/1</span>
                </span>
            </h4>
            <div id="card-container"></div>
            <div class="hint-text">← 左右滑动卡片浏览页面</div>
        </div>
    </div>

    <div class="resize-handle" id="resize2"></div>

    <!-- 右侧预览与设置 -->
    <div id="preview-panel">
        <h3>👁️ 快速预览 <span id="preview-line-counter"></span></h3>
        <div id="mini-preview-wrapper">
            <div id="mini-preview"></div>
            <div id="preview-resize-handle">⋮⋮</div>
        </div>
        <div class="setting-group">
            <label>🎨 背景类型</label>
            <div class="bg-selector">
                <div class="bg-option active" data-bg="solid-black" title="纯黑"></div>
                <div class="bg-option" data-bg="solid-white" title="纯白"></div>
                <div class="bg-option" data-bg="solid-gray" title="纯灰"></div>
                <div class="bg-option" data-bg="particles" title="粒子"></div>
                <div class="bg-option" data-bg="gradient" title="渐变"></div>
                <div class="bg-option" data-bg="image" id="upload-bg-trigger" title="上传图片"></div>
                <input type="file" id="bg-image-input" accept="image/*" hidden>
            </div>
            <button id="upload-bg-btn" class="btn-outline" style="width:100%; margin-top:8px;">🖼️ 上传背景图片</button>
            <div id="my-backgrounds-container" class="my-backgrounds"></div>
            <button id="free-bg-link" class="btn-outline" style="width:100%; margin-top:8px;">🎨 免费背景素材</button>
        </div>
        <div class="setting-group">
            <label>🅰️ 字体选择</label>
            <select id="font-family-selector">
                <option value="'Microsoft YaHei','PingFang SC',sans-serif" selected>微软雅黑</option>
                <option value="'SimSun','Songti SC',serif">宋体</option>
                <option value="'SimHei','Heiti SC',sans-serif">黑体</option>
                <option value="'KaiTi','Kaiti SC',serif">楷体</option>
                <option value="'FangSong','STFangsong',serif">仿宋</option>
                <option value="'Noto Sans SC','Source Han Sans SC',sans-serif">思源黑体</option>
            </select>
        </div>
        <div class="setting-group">
            <label>🔤 字体大小 <span id="font-val">56</span>px</label>
            <input type="range" id="font-slider" min="24" max="120" value="56" step="2">
        </div>
        <div class="setting-group">
            <label>📏 默认行数 <input type="number" id="default-lines-input" min="1" max="20" value="4"> 行</label>
            <div class="setting-tip">💡 用空行或 [page] 可自定义每页行数</div>
        </div>
        <div class="setting-group">
            <label>📍 垂直位置 <span id="pos-val">45</span>%</label>
            <input type="range" id="pos-slider" min="20" max="70" value="45">
        </div>
        <div class="setting-group">
            <label>⏱️ 自动播放</label>
            <div>
                <input type="number" id="autoplay-interval" min="1" max="30" value="5"> 秒
                <button id="autoplay-toggle" class="btn-outline btn">▶ 开始</button>
                <button id="autoplay-stop" class="btn-outline btn">⏹️</button>
            </div>
            <div class="progress-bar"><div class="progress-fill" id="autoplay-progress"></div></div>
        </div>
        <div class="setting-group">
            <label>🎭 界面主题</label>
            <select id="theme-selector">
                <option value="dark" selected>深色</option>
                <option value="light">浅色</option>
                <option value="warm">暖色</option>
                <option value="high-contrast">高对比</option>
            </select>
            <button id="theme-bg-upload-btn" class="btn-outline" style="width:100%; margin-top:8px;">🖼️ 自定义主题背景</button>
            <input type="file" id="theme-bg-input" accept="image/*" hidden>
        </div>
        <button id="open-display-btn" class="btn" style="background:#2e7d32; width:100%;">📺 打开演示窗口</button>
        <button id="open-leader-btn" class="btn btn-outline" style="width:100%; margin-top:8px;">📱 主领视图</button>
        <p class="hint-text" style="margin-top:6px;">📱 手机也可打开此链接</p>
        <p class="hint-text">B=黑屏 W=白屏 F=全屏</p>
    </div>
</div>
<div id="toast"></div>
</body>
</html>
